server {
  listen 80;
  server_tokens off;

  client_max_body_size 10m;

  index index.html;

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend_kitty:9000/api/;
  }

  location /admin/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend_kitty:9000/admin/;
  }

  location /media/ {
	alias /media/;
  }

  location /static/ {
	root /static;
  }

  location / {
    root /static/;
    try_files $uri $uri/ /index.html;
    proxy_set_header Host $http_host;
  }
}
